<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Service — Dev UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .typing-cursor::after {
      content: '▋';
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #messages { scroll-behavior: smooth; }

    /* Markdown styles */
    .md-body p              { margin-bottom: 0.6em; }
    .md-body p:last-child   { margin-bottom: 0; }
    .md-body h1, .md-body h2, .md-body h3, .md-body h4 {
      font-weight: 600; margin: 0.8em 0 0.4em;
    }
    .md-body h1 { font-size: 1.2em; }
    .md-body h2 { font-size: 1.1em; }
    .md-body h3 { font-size: 1em; }
    .md-body ul  { list-style: disc;    padding-left: 1.4em; margin-bottom: 0.6em; }
    .md-body ol  { list-style: decimal; padding-left: 1.4em; margin-bottom: 0.6em; }
    .md-body li  { margin-bottom: 0.2em; }
    .md-body code {
      background: #f3f4f6; border-radius: 4px;
      padding: 0.1em 0.35em; font-size: 0.85em; font-family: monospace;
    }
    .md-body pre {
      background: #1e1e2e; color: #cdd6f4;
      border-radius: 8px; padding: 12px; margin: 0.6em 0;
      overflow-x: auto; font-size: 0.82em;
    }
    .md-body pre code { background: none; padding: 0; color: inherit; }
    .md-body blockquote {
      border-left: 3px solid #d1d5db; padding-left: 12px;
      color: #6b7280; margin: 0.6em 0;
    }
    .md-body a    { color: #4f46e5; text-decoration: underline; }
    .md-body strong { font-weight: 600; }
    .md-body em   { font-style: italic; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 0.6em 0; font-size: 0.85em; }
    .md-body th, .md-body td { border: 1px solid #e5e7eb; padding: 4px 10px; }
    .md-body th   { background: #f9fafb; font-weight: 600; }
    .md-body hr   { border: none; border-top: 1px solid #e5e7eb; margin: 0.8em 0; }
  </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
      </div>
      <div>
        <h1 class="font-semibold text-gray-800 text-sm">Agent Service</h1>
        <p class="text-xs text-gray-400">Dev UI</p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <!-- Status indicator -->
      <span id="status-dot" class="w-2 h-2 rounded-full bg-gray-300"></span>
      <span id="status-text" class="text-xs text-gray-500">tidak terhubung</span>

      <!-- Settings toggle -->
      <button onclick="toggleSettings()"
        class="ml-3 text-xs text-indigo-600 hover:text-indigo-800 font-medium border border-indigo-200 rounded px-2 py-1">
        ⚙ Pengaturan
      </button>
    </div>
  </header>

  <!-- Settings panel -->
  <div id="settings-panel" class="hidden bg-indigo-50 border-b border-indigo-100 px-4 py-3">
    <div class="max-w-2xl mx-auto grid grid-cols-1 sm:grid-cols-3 gap-3">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Base URL</label>
        <input id="cfg-url" type="text" value="http://localhost:8080"
          class="w-full text-xs border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-indigo-400" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">API Key</label>
        <input id="cfg-key" type="password" placeholder="your-secret-api-key"
          class="w-full text-xs border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-indigo-400" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Session ID</label>
        <div class="flex gap-1">
          <input id="cfg-session" type="text"
            class="flex-1 text-xs border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-indigo-400" />
          <button onclick="newSession()"
            class="text-xs bg-gray-200 hover:bg-gray-300 rounded px-2 py-1.5 text-gray-600">
            Baru
          </button>
        </div>
      </div>
    </div>
    <div class="max-w-2xl mx-auto mt-2 flex items-center gap-4">
      <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer">
        <input id="cfg-stream" type="checkbox" checked class="rounded" />
        Gunakan streaming (SSE)
      </label>
      <button onclick="checkHealth()"
        class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">
        Cek Koneksi →
      </button>
      <button onclick="clearChat()"
        class="text-xs text-red-500 hover:text-red-700 font-medium">
        Hapus Chat
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
    <div id="empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-400">
      <div class="text-4xl mb-3">💬</div>
      <p class="text-sm font-medium">Mulai percakapan</p>
      <p class="text-xs mt-1">Ketik pesan di bawah. Konfigurasi server di ⚙ Pengaturan.</p>
    </div>
  </div>

  <!-- Input area -->
  <div class="bg-white border-t border-gray-200 px-4 py-3">
    <div class="max-w-3xl mx-auto flex gap-2">
      <textarea id="input" rows="1" placeholder="Ketik pesan..."
        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-300"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="send()"
        class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors">
        Kirim
      </button>
    </div>
  </div>

<script>
  // ── State ───────────────────────────────────────
  let isLoading = false;

  function cfg() {
    return {
      url:     document.getElementById('cfg-url').value.replace(/\/$/, ''),
      key:     document.getElementById('cfg-key').value,
      session: document.getElementById('cfg-session').value,
      stream:  document.getElementById('cfg-stream').checked,
    };
  }

  function newSession() {
    document.getElementById('cfg-session').value = 'session-' + Math.random().toString(36).slice(2, 9);
  }

  function toggleSettings() {
    document.getElementById('settings-panel').classList.toggle('hidden');
  }

  // Init session ID on load
  newSession();

  // ── Health check ────────────────────────────────
  async function checkHealth() {
    const { url } = cfg();
    setStatus('checking');
    try {
      const res = await fetch(`${url}/health`);
      const data = await res.json();
      setStatus(data.status === 'ok' ? 'ok' : 'error');
    } catch {
      setStatus('error');
    }
  }

  function setStatus(state) {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const map  = {
      ok:       ['bg-green-500', 'terhubung'],
      error:    ['bg-red-500',   'tidak bisa konek'],
      checking: ['bg-yellow-400','mengecek...'],
    };
    const [color, label] = map[state] || ['bg-gray-300', 'tidak terhubung'];
    dot.className  = `w-2 h-2 rounded-full ${color}`;
    text.textContent = label;
  }

  // ── Chat UI helpers ─────────────────────────────
  function clearChat() {
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `<div id="empty-state" class="flex flex-col items-center justify-center h-full text-center text-gray-400">
      <div class="text-4xl mb-3">💬</div>
      <p class="text-sm font-medium">Mulai percakapan</p>
      <p class="text-xs mt-1">Ketik pesan di bawah. Konfigurasi server di ⚙ Pengaturan.</p>
    </div>`;
  }

  function hideEmpty() {
    document.getElementById('empty-state')?.remove();
  }

  function appendUserBubble(text) {
    hideEmpty();
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'flex justify-end';
    el.innerHTML = `
      <div class="max-w-xs sm:max-w-md bg-indigo-600 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm">
        ${escHtml(text)}
      </div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function createAssistantBubble() {
    hideEmpty();
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'flex justify-start';
    el.innerHTML = `
      <div class="max-w-xs sm:max-w-2xl">
        <div class="flex items-center gap-2 mb-1">
          <div class="w-6 h-6 bg-indigo-100 rounded-full flex items-center justify-center text-xs">🤖</div>
          <span class="text-xs text-gray-500">Asisten</span>
        </div>
        <div id="skill-events" class="flex flex-wrap gap-1 mb-1"></div>
        <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-2.5 text-sm text-gray-800 shadow-sm">
          <div id="reply-text" class="md-body typing-cursor"></div>
        </div>
        <div id="done-meta" class="text-xs text-gray-400 mt-1 hidden"></div>
      </div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  function appendSkillEvent(container, type, skillName) {
    const eventsEl = container.querySelector('#skill-events');
    const pill = document.createElement('span');
    if (type === 'skill_start') {
      pill.className = 'text-xs bg-yellow-100 text-yellow-700 border border-yellow-200 rounded-full px-2 py-0.5 animate-pulse';
      pill.id = `skill-${skillName}`;
      pill.textContent = `⚡ ${skillName}…`;
    } else if (type === 'skill_result') {
      const existing = container.querySelector(`#skill-${skillName}`);
      if (existing) {
        existing.className = 'text-xs bg-green-100 text-green-700 border border-green-200 rounded-full px-2 py-0.5';
        existing.textContent = `✓ ${skillName}`;
        return;
      }
      pill.className = 'text-xs bg-green-100 text-green-700 border border-green-200 rounded-full px-2 py-0.5';
      pill.textContent = `✓ ${skillName}`;
    }
    eventsEl.appendChild(pill);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('send-btn').disabled = val;
    document.getElementById('input').disabled = val;
  }

  // ── Send message ────────────────────────────────
  async function send() {
    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message || isLoading) return;

    const { url, key, session, stream } = cfg();
    if (!key) {
      alert('Isi API Key di Pengaturan terlebih dahulu.');
      return;
    }

    input.value = '';
    input.style.height = 'auto';
    setLoading(true);
    appendUserBubble(message);

    if (stream) {
      await sendStream(url, key, session, message);
    } else {
      await sendBlocking(url, key, session, message);
    }

    setLoading(false);
  }

  // ── Streaming (SSE via fetch ReadableStream) ────
  async function sendStream(url, key, session, message) {
    const bubble = createAssistantBubble();
    const replyEl = bubble.querySelector('#reply-text');
    const metaEl  = bubble.querySelector('#done-meta');
    const msgs    = document.getElementById('messages');

    try {
      const res = await fetch(`${url}/api/v1/chat/stream`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`,
        },
        body: JSON.stringify({ session_id: session, message }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        replyEl.classList.remove('typing-cursor');
        replyEl.textContent = `❌ Error ${res.status}: ${err.error || res.statusText}`;
        setStatus('error');
        return;
      }

      setStatus('ok');
      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let rawText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          switch (event.type) {
            case 'token':
              rawText += event.content;
              replyEl.innerHTML = marked.parse(rawText);
              msgs.scrollTop = msgs.scrollHeight;
              break;
            case 'skill_start':
            case 'skill_result':
              appendSkillEvent(bubble, event.type, event.skill);
              break;
            case 'done':
              replyEl.classList.remove('typing-cursor');
              replyEl.innerHTML = marked.parse(rawText);
              if (event.skills_used?.length) {
                metaEl.textContent = `Skills: ${event.skills_used.join(', ')} · ID: ${event.message_id}`;
                metaEl.classList.remove('hidden');
              }
              break;
            case 'error':
              replyEl.classList.remove('typing-cursor');
              replyEl.textContent = `❌ ${event.error}`;
              setStatus('error');
              break;
          }
        }
      }
    } catch (err) {
      replyEl.classList.remove('typing-cursor');
      replyEl.textContent = `❌ Koneksi gagal: ${err.message}`;
      setStatus('error');
    }
  }

  // ── Non-streaming (regular POST) ───────────────
  async function sendBlocking(url, key, session, message) {
    const bubble  = createAssistantBubble();
    const replyEl = bubble.querySelector('#reply-text');
    const metaEl  = bubble.querySelector('#done-meta');

    replyEl.textContent = '';

    try {
      const res = await fetch(`${url}/api/v1/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`,
        },
        body: JSON.stringify({ session_id: session, message }),
      });

      const data = await res.json();

      if (!res.ok) {
        replyEl.classList.remove('typing-cursor');
        replyEl.textContent = `❌ Error ${res.status}: ${data.error || res.statusText}`;
        setStatus('error');
        return;
      }

      setStatus('ok');
      replyEl.classList.remove('typing-cursor');
      replyEl.innerHTML = marked.parse(data.reply);

      if (data.skills_used?.length) {
        data.skills_used.forEach(s => appendSkillEvent(bubble, 'skill_result', s));
        metaEl.textContent = `Skills: ${data.skills_used.join(', ')} · Tokens: ${data.usage?.total_tokens ?? '?'}`;
        metaEl.classList.remove('hidden');
      }
    } catch (err) {
      replyEl.classList.remove('typing-cursor');
      replyEl.textContent = `❌ Koneksi gagal: ${err.message}`;
      setStatus('error');
    }
  }

  // Auto check health on load
  window.addEventListener('load', () => checkHealth());
</script>
</body>
</html>
