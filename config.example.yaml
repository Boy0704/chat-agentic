server:
  port: 8080
  api_key: "your-secret-api-key"

  # Ukuran maksimum request body (bytes). Default: 1MB.
  max_body_bytes: 1048576

  # Rate limiting per IP (opsional). Default: off.
  rate_limit:
    enabled: false
    requests_per_minute: 60

  cors:
    # Daftar origin yang diizinkan akses API ini.
    # Default: semua origin diizinkan ["*"]
    # Untuk production, ganti dengan domain chatbot klien:
    # allow_origins: ["https://app.klien.com", "https://pos.klien.com"]
    allow_origins: ["*"]

llm:
  base_url: "https://api.openai.com/v1"  # atau http://localhost:11434/v1 untuk Ollama
  api_key: "sk-xxx"
  model: "gpt-4o"
  timeout_seconds: 30                    # timeout per LLM API call

db:
  path: "./data/agent.db"   # SQLite untuk sessions, dibuat otomatis

# Konfigurasi untuk memanggil API sistem klien (POS, Ecommerce, dll)
# Skills menggunakan ini untuk fetch data dari sistem yang sudah berjalan
client_api:
  base_url: "http://localhost:3000"   # ganti dengan URL API sistem klien
  auth_header: "Bearer xxx"           # opsional, sesuai autentikasi sistem klien
  timeout_seconds: 10

skills:
  custom_path: "./custom-skills/"     # folder berisi skill klien (.py/.js + .manifest.json)
  timeout_seconds: 30                 # timeout per eksekusi script skill

log:
  # path: ""                          # kosong = log ke stdout (cocok untuk Docker)
  # Untuk on-premise tanpa Docker, set path ke file:
  # path: "./logs/agent.log"
  level: "info"                       # debug | info | warn | error
  max_size_mb: 100                    # ukuran maksimum per file log sebelum di-rotate
  max_age_days: 30                    # hapus log lama setelah N hari
  max_backups: 5                      # jumlah file lama yang disimpan
  compress: true                      # kompres file rotasi dengan gzip
